{% extends "templates/web.html" %}

{% block page_content %}

{% include "hospital_pharmacy/templates/navbar.html" %}

<div class="container d-flex align-items-center justify-content-center" style="min-height: 75vh;">

    <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="max-width: 480px; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
        
        <!-- Premium Accent Header -->
        <div class="p-5 text-center text-white" style="background: linear-gradient(135deg, #0d6efd, #0056b3);">
            <h2 class="fw-bold mb-0">Sign In</h2>
        </div>

        <div class="card-body p-5">
            <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

            <form id="login-form" onsubmit="event.preventDefault(); login_user();">
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Email or Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="text" id="login_email" class="form-control bg-light border-start-0 py-2.5" placeholder="name@example.com or Administrator" autocomplete="username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="login_password" class="form-control bg-light border-start-0 py-2.5" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" id="btn-login" class="btn btn-primary btn-lg rounded-3 py-3 fw-bold transition-all" style="background: linear-gradient(135deg, #0d6efd, #0056b3); border: none; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.25);">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0">Don't have an account? <a href="/register?redirect-to={{ redirect_to|urlencode }}" class="text-decoration-none fw-bold text-primary">Register Here</a></p>
            </div>
        </div>
    </div>

</div>

<!-- Styles for smooth interactions -->
<style>
    .transition-all {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .transition-all:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(13, 110, 253, 0.35) !important;
    }
    .transition-all:active {
        transform: translateY(1px);
    }
    .input-group-text {
        border-color: #dee2e6;
    }
    .form-control:focus {
        box-shadow: none;
        border-color: #0d6efd;
    }
    .form-control:focus + .input-group-text {
        border-color: #0d6efd;
    }
</style>

<!-- Bootstrap icons link if not loaded -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script>
function login_user() {
    const email = $("#login_email").val().trim();
    const password = $("#login_password").val();
    const alertBox = $("#login-alert");
    const loginBtn = $("#btn-login");

    if (!email || !password) return;

    alertBox.addClass("d-none");
    loginBtn.prop("disabled", true).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Signing in...');

    frappe.call({
        method: "login",
        args: {
            usr: email,
            pwd: password
        },
        callback: function(r) {
            const login_message = (r.message || "").toString();
            if (login_message === "Logged In" || login_message === "Logged in") {
                window.location.href = "{{ redirect_to|safe }}";
            } else {
                loginBtn.prop("disabled", false).text("Sign In");
                alertBox.text(r.message || "Invalid email or password.").removeClass("d-none");
            }
        },
        error: function(err) {
            loginBtn.prop("disabled", false).text("Sign In");
            alertBox.text("Authentication failed. Please check your credentials.").removeClass("d-none");
        }
    });
}
</script>

{% endblock %}
