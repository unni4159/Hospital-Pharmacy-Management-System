{% extends "templates/web.html" %}

{% block page_content %}

{% include "hospital_pharmacy/templates/navbar.html" %}

<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh; padding: 40px 20px;">

    <div class="card border-0 shadow-premium rounded-4 overflow-hidden" style="max-width: 450px; width: 100%; background: #ffffff;">
        
        <!-- Elegant Header -->
        <div class="p-5 text-center" style="background: linear-gradient(135deg, #0d9488, #0f766e); position: relative;">
            <div class="mb-3" style="font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));">🏥</div>
            <h2 class="fw-bold mb-1 text-white" style="font-size: 26px; letter-spacing: -0.02em;">Sign In</h2>
            <p class="mb-0 text-white-50 small">Access your hospital pharmacy account</p>
        </div>

        <div class="card-body p-5">
            <div id="login-alert" class="alert alert-danger d-none rounded-3 small" role="alert"></div>

            <form id="login-form" onsubmit="event.preventDefault(); login_user();">
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small mb-2">Email or Username</label>
                    <div class="premium-input-group">
                        <span class="premium-input-icon"><i class="bi bi-envelope"></i></span>
                        <input type="text" id="login_email" class="premium-input" placeholder="name@example.com or Administrator" autocomplete="username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small mb-2">Password</label>
                    <div class="premium-input-group">
                        <span class="premium-input-icon"><i class="bi bi-lock"></i></span>
                        <input type="password" id="login_password" class="premium-input" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" id="btn-login" class="btn-premium-action">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="text-center mt-4 pt-2">
                <p class="text-muted mb-0 small">Don't have an account? <a href="/register?redirect-to={{ redirect_to|urlencode }}" class="text-decoration-none fw-bold text-teal">Register Here</a></p>
            </div>
        </div>
    </div>

</div>

<!-- Styles for premium layout -->
<style>
    .shadow-premium {
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.04) !important;
    }
    
    .premium-input-group {
        display: flex;
        align-items: center;
        background: #f8fafc !important;
        border: 1.5px solid #cbd5e1 !important;
        border-radius: 50px !important;
        padding: 2px 18px !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .premium-input-group:focus-within {
        border-color: #0d9488 !important;
        box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1) !important;
        background: #ffffff !important;
    }

    .premium-input-icon {
        font-size: 16px;
        color: #64748b;
        margin-right: 12px;
        display: flex;
        align-items: center;
    }

    .premium-input {
        flex: 1;
        border: none !important;
        background: transparent !important;
        padding: 10px 0 !important;
        outline: none !important;
        font-size: 14px !important;
        color: #0f172a !important;
    }
    
    .premium-input::placeholder {
        color: #94a3b8;
    }

    .btn-premium-action {
        background: linear-gradient(135deg, #0d9488, #0f766e) !important;
        color: #ffffff !important;
        border: none !important;
        border-radius: 50px !important;
        padding: 14px 24px !important;
        font-weight: 700 !important;
        font-size: 15px !important;
        letter-spacing: -0.01em;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3) !important;
    }

    .btn-premium-action:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4) !important;
    }

    .btn-premium-action:active {
        transform: translateY(1px);
    }
    
    .text-teal {
        color: #0d9488 !important;
        transition: color 0.2s ease;
    }
    
    .text-teal:hover {
        color: #0f766e !important;
    }
</style>

<!-- Bootstrap icons link if not loaded -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script>
function login_user() {
    const email = $("#login_email").val().trim();
    const password = $("#login_password").val();
    const alertBox = $("#login-alert");
    const loginBtn = $("#btn-login");

    if (!email || !password) return;

    alertBox.addClass("d-none");
    loginBtn.prop("disabled", true).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="margin-right: 8px;"></span> Signing in...');

    frappe.call({
        method: "login",
        args: {
            usr: email,
            pwd: password
        },
        callback: function(r) {
            const login_message = (r.message || "").toString();
            if (login_message === "Logged In" || login_message === "Logged in") {
                window.location.href = "{{ redirect_to|safe }}";
            } else {
                loginBtn.prop("disabled", false).text("Sign In");
                alertBox.text(r.message || "Invalid email or password.").removeClass("d-none");
            }
        },
        error: function(err) {
            loginBtn.prop("disabled", false).text("Sign In");
            alertBox.text("Authentication failed. Please check your credentials.").removeClass("d-none");
        }
    });
}
</script>

{% endblock %}
