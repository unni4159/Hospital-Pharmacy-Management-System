{% extends "templates/web.html" %}

{% block page_content %}

{% include "hospital_pharmacy/templates/navbar.html" %}

<div class="container d-flex align-items-center justify-content-center my-5" style="min-height: 80vh;">

    <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="max-width: 520px; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
        
        <!-- Premium Accent Header -->
        <div class="p-5 text-center text-white" style="background: linear-gradient(135deg, #0d6efd, #0056b3);">
            <h2 class="fw-bold mb-1">Create Account</h2>
            <p class="mb-0 opacity-75">Sign up to get your medical orders delivered quickly</p>
        </div>

        <div class="card-body p-5">
            <div id="register-alert" class="alert alert-danger d-none" role="alert"></div>
            <div id="register-success" class="alert alert-success d-none" role="alert"></div>

            <form id="register-form" onsubmit="event.preventDefault(); register_customer();">
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" id="customer_name" class="form-control bg-light border-start-0 py-2.5" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" id="email" class="form-control bg-light border-start-0 py-2.5" placeholder="john@example.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Mobile Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone text-muted"></i></span>
                        <input type="tel" id="mobile" class="form-control bg-light border-start-0 py-2.5" placeholder="+1234567890">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control bg-light border-start-0 py-2.5" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-check2-circle text-muted"></i></span>
                        <input type="password" id="confirm_password" class="form-control bg-light border-start-0 py-2.5" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" id="btn-register" class="btn btn-primary btn-lg rounded-3 py-3 fw-bold transition-all" style="background: linear-gradient(135deg, #0d6efd, #0056b3); border: none; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.25);">
                        Register Account
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0">Already have an account? <a href="/login?redirect-to={{ redirect_to|urlencode }}" class="text-decoration-none fw-bold text-primary">Sign In</a></p>
            </div>
        </div>
    </div>

</div>

<!-- Styles for smooth interactions -->
<style>
    .transition-all {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .transition-all:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(13, 110, 253, 0.35) !important;
    }
    .transition-all:active {
        transform: translateY(1px);
    }
    .input-group-text {
        border-color: #dee2e6;
    }
    .form-control:focus {
        box-shadow: none;
        border-color: #0d6efd;
    }
    .form-control:focus + .input-group-text {
        border-color: #0d6efd;
    }
</style>

<!-- Bootstrap icons link if not loaded -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script>
function register_customer() {
    const customer_name = $("#customer_name").val().trim();
    const email = $("#email").val().trim();
    const mobile = $("#mobile").val().trim();
    const password = $("#password").val();
    const confirm_password = $("#confirm_password").val();
    
    const alertBox = $("#register-alert");
    const successBox = $("#register-success");
    const registerBtn = $("#btn-register");

    alertBox.addClass("d-none");
    successBox.addClass("d-none");

    if (password !== confirm_password) {
        alertBox.text("Passwords do not match.").removeClass("d-none");
        return;
    }

    registerBtn.prop("disabled", true).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Creating Account...');

    frappe.call({
        method: "hospital_pharmacy.api.register_portal_user",
        args: {
            customer_name: customer_name,
            email: email,
            password: password,
            mobile: mobile
        },
        callback: function(r) {
            if (r.message && r.message.status === "success") {
                successBox.text("Registration successful! Redirecting...").removeClass("d-none");
                setTimeout(function() {
                    window.location.href = "{{ redirect_to|safe }}";
                }, 1500);
            } else {
                registerBtn.prop("disabled", false).text("Register Account");
                alertBox.text("Registration failed. Please try again.").removeClass("d-none");
            }
        },
        error: function(err) {
            registerBtn.prop("disabled", false).text("Register Account");
            let msg = "An error occurred during registration. Please verify your details.";
            if (err._server_messages) {
                try {
                    let server_msgs = JSON.parse(err._server_messages);
                    msg = server_msgs.map(m => JSON.parse(m).message).join("<br>");
                } catch(e) {}
            }
            alertBox.html(msg).removeClass("d-none");
        }
    });
}
</script>

{% endblock %}
